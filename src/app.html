<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark" />
		<meta name="theme-color" content="#0a0a0b" />
		<!-- Favicons: the real Trick Trades logo at every size browsers ask for -->
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicon-192.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo-300.png" />
		<!-- The LCP poster image is served from this cross-origin bucket -->
		<link rel="preconnect" href="https://trick-trades-media-storage.storage.googleapis.com" />
		<!-- Gate motion: only hide [data-anim] elements when JS runs AND motion is allowed,
		     so prerendered content stays fully visible for search engines and no-JS users. -->
		<script>
			try {
				if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
					document.documentElement.classList.add('js');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
